<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" fill="none">
  <!-- ===== ICON GROUP ===== -->
  <g transform="translate(2, 2)">

    <!-- Hexagon/house outer shell - navy dark -->
    <!-- Top-left diagonal stroke -->
    <path d="M28 38 L18 22 L34 8 L50 8" stroke="#1e2d7d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Top-right diagonal stroke -->
    <path d="M50 8 L66 8 L56 22" stroke="#1e2d7d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right side going down -->
    <path d="M56 22 L56 52 L42 64" stroke="#252f82" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Bottom left arc -->
    <path d="M42 64 L26 52 L26 36" stroke="#252f82" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Inner N stroke - dark navy -->
    <path d="M30 52 L30 24 L52 52 L52 24" stroke="#1a2570" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Inner F stroke (right portion) - slightly lighter navy -->
    <path d="M44 36 L56 36" stroke="#2d3896" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- F bottom horizontal fill -->
    <path d="M44 28 L56 28" stroke="#2d3896" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Circuit lines - cyan -->
    <!-- Left circuit line horizontal -->
    <line x1="8"  y1="30" x2="26" y2="30" stroke="#00b4d8" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right circuit line horizontal -->
    <line x1="56" y1="30" x2="74" y2="30" stroke="#00b4d8" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Left node circle (outer) -->
    <circle cx="8"  cy="30" r="3.5" fill="none" stroke="#00b4d8" stroke-width="2.2"/>
    <circle cx="8"  cy="30" r="1.2" fill="#00b4d8"/>
    <!-- Left node circle (inner connector) -->
    <circle cx="26" cy="30" r="3" fill="none" stroke="#00b4d8" stroke-width="2"/>
    <circle cx="26" cy="30" r="1" fill="#00b4d8"/>

    <!-- Right node circle (inner connector) -->
    <circle cx="56" cy="30" r="3" fill="none" stroke="#00b4d8" stroke-width="2"/>
    <circle cx="56" cy="30" r="1" fill="#00b4d8"/>
    <!-- Right node circle (outer) -->
    <circle cx="74" cy="30" r="3.5" fill="none" stroke="#00b4d8" stroke-width="2.2"/>
    <circle cx="74" cy="30" r="1.2" fill="#00b4d8"/>

    <!-- Bottom-left circuit node -->
    <line x1="16" y1="52" x2="26" y2="52" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
    <circle cx="13" cy="52" r="3" fill="none" stroke="#00b4d8" stroke-width="2"/>
    <circle cx="13" cy="52" r="1" fill="#00b4d8"/>

  </g>

  <!-- ===== TEXT GROUP ===== -->
  <!-- NexusForge wordmark -->
  <text x="88" y="42"
    font-family="'Segoe UI', 'Arial', sans-serif"
    font-size="22"
    font-weight="800"
    fill="#1a2570"
    letter-spacing="-0.3">NexusForge</text>

  <!-- Tagline -->
  <text x="88" y="58"
    font-family="'Segoe UI', 'Arial', sans-serif"
    font-size="9.5"
    font-weight="400"
    fill="#4a5899"
    letter-spacing="0.2">Connecting Innovation with Power</text>
</svg>
